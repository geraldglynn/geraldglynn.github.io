// ─── CURSOR ─────────────────────────────────────────────────────
function useCursor() {
  useEffect(() => {
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;

    const move = (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      setTimeout(() => {
        ring.style.left = e.clientX + 'px';
        ring.style.top = e.clientY + 'px';
      }, 60);
    };

    const over = () => { cursor.style.transform = 'translate(-50%,-50%) scale(2.5)'; };
    const out = () => { cursor.style.transform = 'translate(-50%,-50%) scale(1)'; };

    document.addEventListener('mousemove', move);
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', over);
      el.addEventListener('mouseleave', out);
    });
    return () => document.removeEventListener('mousemove', move);
  }, []);
}

// ─── INTERSECTION OBSERVER HOOK ──────────────────────────────────
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setVisible(true); },
      { threshold: 0.15 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

                    left: pos.includes('left') ? -1 : 'auto',
                    right: pos.includes('right') ? -1 : 'auto',
                  }} />
                ))}

                <div className="mono mb-2" style={{ fontSize: '0.65rem', color: 'var(--amber)', letterSpacing: '0.2em' }}>
                  CURRENTLY
                </div>
                <div style={{ fontFamily: 'Playfair Display', fontSize: '1.4rem', marginBottom: 24 }}>
                  Open to new opportunities
                </div>
                <div className="amber-line mb-6" />

                {[
                  { label: 'Location', value: 'San Francisco, CA' },
                  { label: 'Focus', value: 'Full-Stack / Backend' },
                  { label: 'Stack', value: 'React + Kotlin' },
                  { label: 'Status', value: '🟢 Available' },
                ].map(item => (
                  <div key={item.label} className="flex justify-between items-center mb-4">
                    <span className="mono" style={{ fontSize: '0.65rem', color: '#555', letterSpacing: '0.1em' }}>{item.label}</span>

              {/* Shadow card behind */}

                position: 'absolute', top: 12, left: 12, right: -12, bottom: -12,
                border: '1px solid #1a1a1a',
                zIndex: -1,
              }} />
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── CONTACT ─────────────────────────────────────────────────────
function Contact() {
  const [ref, visible] = useReveal();
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [sent, setSent] = useState(false);

  const handleSubmit = () => {
    if (!form.name || !form.email || !form.message) return;
    setSent(true);
    setTimeout(() => setSent(false), 3000);
    setForm({ name: '', email: '', message: '' });
  };

  return (
    <section id="contact" className="py-32 px-6" style={{ background: 'var(--dark-2)' }}>
      <div className="max-w-6xl mx-auto">
        <div ref={ref} style={{ opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(40px)', transition: 'all 0.8s ease' }}>
          <div className="grid md:grid-cols-2 gap-16">
            {/* Left */}
            <div>
              <p className="section-label mb-4">Get in touch</p>
              <h2 style={{ fontFamily: 'Playfair Display', fontWeight: 700, fontSize: 'clamp(2rem, 4vw, 3rem)', lineHeight: 1.15, marginBottom: 24 }}>
                Let's build<br/>something<br/><span style={{ color: 'var(--amber)' }}>great together.</span>
              </h2>
              <p style={{ color: '#666', lineHeight: 1.85, fontSize: '0.9rem', marginBottom: 32 }}>
                Whether you have a project in mind, need a technical co-founder, or just want to say hi -- my inbox is always open.
              </p>

              <div className="flex flex-col gap-4">
                {[
                  { icon: '📧', label: 'Email', value: 'hello@janedoe.dev', href: 'mailto:hello@janedoe.dev' },
                  { icon: '🐙', label: 'GitHub', value: 'github.com/janedoe', href: 'https://github.com' },
                  { icon: '💼', label: 'LinkedIn', value: 'linkedin.com/in/janedoe', href: 'https://linkedin.com' },
                ].map(item => (
                  <a key={item.label} href={item.href}
                    style={{ textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 12, padding: '16px 0', borderBottom: '1px solid #1a1a1a' }}>
                    <span style={{ fontSize: '1rem' }}>{item.icon}</span>
                    <div>
                      <div className="mono" style={{ fontSize: '0.6rem', color: '#444', letterSpacing: '0.15em' }}>{item.label}</div>
                      <div style={{ fontSize: '0.85rem', color: '#888', marginTop: 2 }}>{item.value}</div>
                    </div>
                  </a>
                ))}
              </div>
            </div>

            {/* Right -- form */}
            <div style={{ position: 'relative' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <div className="grid grid-cols-2 gap-4">
                  <input
                    className="contact-input"
                    placeholder="Your name"
                    value={form.name}
                    onChange={e => setForm({ ...form, name: e.target.value })}
                  />
                  <input
                    className="contact-input"
                    placeholder="Email address"
                    type="email"
                    value={form.email}
                    onChange={e => setForm({ ...form, email: e.target.value })}
                  />
                </div>
                <textarea
                  className="contact-input"
                  rows={6}
                  placeholder="Tell me about your project..."
                  value={form.message}
                  onChange={e => setForm({ ...form, message: e.target.value })}
                  style={{ resize: 'vertical' }}
                />
                <button onClick={handleSubmit} className="btn-primary" style={{ width: '100%', textAlign: 'center', cursor: 'none' }}>
                  {sent ? '✓ Message sent!' : 'Send message →'}
                </button>
                <p className="mono text-center" style={{ fontSize: '0.6rem', color: '#333', letterSpacing: '0.1em' }}>
                  Typically respond within 24 hours
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}
